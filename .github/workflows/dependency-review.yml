# Dependency review — blocks PRs that introduce vulnerable or
# license-incompatible dependencies before they reach main.
#
# Runs only on PRs because it compares the PR's dependency graph
# against the base branch. Nothing to do on direct pushes to main.
#
# Fails the check on:
#   - any dependency with a known CVE at "moderate" severity or higher
#   - any dependency under a license not compatible with AGPL-3.0-or-later

name: Dependency review

on:
  pull_request:
    branches: [main]
    paths:
      - "web/package.json"
      - "web/pnpm-lock.yaml"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # AGPL-3.0 is compatible with: GPL-3.0, AGPL-3.0, LGPL-3.0,
          # MIT, BSD, Apache-2.0, ISC, MPL-2.0, Unlicense, CC0-1.0.
          # Deny anything AGPL-incompatible.
          allow-licenses: >-
            MIT,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            MPL-2.0,
            CC0-1.0,
            Unlicense,
            0BSD,
            BlueOak-1.0.0,
            Python-2.0,
            AGPL-3.0-or-later,
            AGPL-3.0,
            GPL-3.0,
            GPL-3.0-or-later,
            LGPL-3.0,
            LGPL-3.0-or-later
