#:schema node_modules/wrangler/config-schema.json
# fail2zig.com — Workers Static Assets.
#
# The custom domain (fail2zig.com) is bound to this Worker via the
# Cloudflare dashboard (Workers → Custom Domains), NOT via a [[routes]]
# block here. Dashboard-managed custom domains handle DNS + routing +
# SSL in one step; a routes block on top of that would be redundant
# and can conflict on deploy.
#
# Phase 9A: pure static-assets Worker.
# Phase 9B: still pure static-assets. The see-it-live dashboard talks
# directly to the demo origin through a Cloudflare Tunnel hostname
# (`demo.fail2zig.com/events`, `/metrics`, `/api/bans`) — there is no
# Worker in the path, no `/api/whoami`, no `/trigger/*`. Keeping this
# deployment assets-only means no dynamic surface to harden, no Worker
# bundle to size-budget, and no routes block to conflict with the
# dashboard-managed custom domain.

name = "fail2zig"
compatibility_date = "2026-04-22"
workers_dev = false

[assets]
directory = "./dist"
# Astro emits a real per-page dist/404.html. Serve it on miss instead
# of treating this as an SPA that rewrites everything to index.html.
not_found_handling = "404-page"
